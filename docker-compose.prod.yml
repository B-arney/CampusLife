services:
  backend:
    image: campuslife-backend
    container_name: campuslife-prod-backend
    env_file:
      - .env.prod
    volumes:
      - ./apps/backend:/app
      - backend_node_modules:/app/node_modules
    ports:
      - ${BACKEND_PORT}:3000
    networks:
      - caddy
      - internal

  frontend:
    image: campuslife-frontend
    container_name: campuslife-prod-frontend
    volumes:
      - ./apps/frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - ${FRONTEND_PORT}:4200
    labels:
      caddy: campuslife.social
      caddy.reverse_proxy: "{{upstreams 4200}}"
      caddy.reverse_proxy_1: /api/* campuslife-prod-backend:3000
    networks:
      - caddy
      - internal

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DATABASE}
    ports:
      - ${POSTGRES_PORT}:5432
    volumes:
      - ./docker/postgres:/var/lib/postgresql/data
    networks:
      - internal

  pgadmin:
    image: dpage/pgadmin4
    container_name: campuslife-prod-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@campuslife.social
      PGADMIN_DEFAULT_PASSWORD: 0G24czxjD1RS3zNy
    ports:
      - 5050:80
    depends_on:
      - postgres
    labels:
      caddy: pg.campuslife.social
      caddy.reverse_proxy: "{{upstreams 80}}"
    networks:
      - caddy
      - internal

volumes:
  backend_node_modules: {}
  frontend_node_modules: {}

networks:
  caddy:
    external: true
  internal:
    name: campuslife_prod_internal
