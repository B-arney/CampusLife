<div class="event-panel">

  <!-- FORM -->
  <form [formGroup]="eventForm" (ngSubmit)="createEvent()" class="form">

    <!-- TOP BAR -->
    <div class="top-bar">
      <button pButton severity="secondary" type="button">⟵</button>
      <h2>New Event</h2>
      <button pButton type="button">Save</button>
    </div>

    <div class="form-row">
      <label>Event name</label>
      <input pInputText formControlName="title" placeholder="Study group" fluid />
    </div>

    <div class="form-row">
      <label>Description</label>
      <textarea pInputTextarea formControlName="description" placeholder="Prepare for the calculus exam on May 20 with us" fluid></textarea>
    </div>

    <div class="form-row">
      <label>Date</label>
      <p-datepicker formControlName="date" dateFormat="yy/mm/dd" placeholder="yyyy/mm/dd" fluid />
    </div>

    <div class="form-row">
      <label>Location</label>
      <input pInputText formControlName="location" placeholder="BO-226" fluid />
    </div>

    <div class="form-row">
      <label>Interests</label>
      <p-multiselect [options]="interests" formControlName="selectedInterests" placeholder="Select Interests" optionLabel="name" display="chip" fluid />
    </div>

  </form>

</div>
