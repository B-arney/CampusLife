<p-toast></p-toast>
    
<div class="profile-container">
	
	<div class="profile-header">
		<h2 class="main-title">PROFILE VIEW</h2>
	</div>

	<form [formGroup]="form" class="profile-form">
	
		<div class="avatar-section">
			<div class="avatar-container">
				@if (currentProfilePicture()) {
					<div class="avatar-md">
						<img [src]="currentProfilePicture()" alt="Avatar">
					</div>
					<svg class="close-badge add-interest-icon" (click)="removeProfilePicture()"
						xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
						<path stroke-linecap="round" stroke-linejoin="round" d="m9.75 9.75 4.5 4.5m0-4.5-4.5 4.5M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
					</svg>
				} @else {
					<div class="avatar-md">
						<svg viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
							<rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
							<circle cx="8.5" cy="8.5" r="1.5"></circle>
							<polyline points="21 15 16 10 5 21"></polyline>
						</svg>
					</div>
				}
			</div>

			<div class="file-upload-wrapper">
				<input type="file" id="profilePicture" accept="image/jpeg, image/png, image/webp" (change)="onFileSelect($event)" />
				<label for="profilePicture" class="add-file-btn">Add file</label>
			</div>
			
			<button pButton type="submit" (click)="onSubmit()" [disabled]="form.invalid" [loading]="isLoading" class="save-btn">Save</button>
		</div>

		<div class="form-fields-list">
			<div class="form-row">
				<label>Name</label>
				<input type="text" formControlName="username" placeholder="Placeholder" class="rounded-input" />
			</div>

			<div class="form-row">
				<label>Email address</label>
				<input type="email" formControlName="email" class="rounded-input readonly-input" />
			</div>

			<div class="form-row">
				<label>Major</label>
				<input type="text" formControlName="major" placeholder="Placeholder" class="rounded-input" />
			</div>

			<div class="form-row interests-row custom-multiselect">
				<label>Interests</label>
				<p-multiSelect id="interests" [options]="interestOptions" formControlName="interests"
					optionLabel="label" optionValue="value" display="chip" [maxSelectedLabels]="10"
					fluid>

					<ng-template pTemplate="dropdownicon">
						<svg class="dropdownicon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.4" stroke="currentColor">
							<path stroke-linecap="round" stroke-linejoin="round" d="M12 9v6m3-3H9m12 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
						</svg>
					</ng-template>
				</p-multiSelect>
			</div>

			<!-- <div class="form-row interests-row">
			<label>Interest area</label>
			<div class="interests-container">
				<p-multiSelect 
				id="interests" 
				[options]="interestOptions" 
				formControlName="interests" 
				optionLabel="label" 
				optionValue="value" 
				display="chip"
				[maxSelectedLabels]="10"
				styleClass="custom-prime-multiselect">
				
				<ng-template pTemplate="dropdownicon">
					<div class="add-interest-icon">+</div>
				</ng-template>

				</p-multiSelect>
			</div>
			</div> -->
		</div> 
	</form>
</div>
