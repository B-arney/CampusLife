<div class="layout">
  <p-toast></p-toast>

  <div class="sidebar">
    <h2>Campus life</h2>
    <ul>
      <li><a routerLink="/landing">Home</a></li>
      <li><a routerLink="/events" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Events</a></li>
      <li>Profile</li>
      <li>Calendar</li>
      <li>News</li>
      <li>Settings</li>
    </ul>
    <div class="logout">
      <button type="button">Log out</button>
    </div>
  </div>

  <div class="content">
    <div class="event-panel list-panel">
      <div class="top-bar">
        <h2>Events</h2>
        <a routerLink="/events/new" class="save-btn create-link">Create event</a>
      </div>

      <p *ngIf="loading" class="muted">Loading events…</p>

      <ul class="event-list" *ngIf="!loading && events.length">
        <li *ngFor="let e of events" class="event-row">
          <div class="event-main">
            <strong>{{ e.title }}</strong>
            <span class="meta">{{ formatDate(e.startAt) }} · {{ e.location }} · {{ e.category }}</span>
          </div>
          <div class="event-actions">
            <a *ngIf="isHost(e)" [routerLink]="['/events', e.id, 'edit']" class="edit-link">Edit</a>
          </div>
        </li>
      </ul>

      <p *ngIf="!loading && !events.length" class="muted">No events yet. Create the first one.</p>
    </div>
  </div>
</div>
