<div class="layout">

  <div class="sidebar">
    <h2 class="sidebar-title">CAMPUS LIFE</h2>

    <div class="profile-pic">
      <img src="assets/Logo.png" alt="Profile" class="logo-img" />
    </div>

    <ul class="nav-menu">
      <li [routerLink]="['/landing']">HOME</li>
      <li [routerLink]="['/profile']" class="active-link">PROFILE</li>
      <li [routerLink]="['/events']">EVENTS</li>
      <li [routerLink]="['/news']">NEWS</li>
      <li [routerLink]="['/calendar']">CALENDAR</li>
      <li [routerLink]="['/settings']">SETTINGS</li>
    </ul>

    <div class="sidebar-bottom">
      <button class="icon-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
      </button>
      <button class="logout-btn">LOG OUT</button>
    </div>
  </div>

  <div class="content">
    <p-toast></p-toast>
    
    <div class="profile-container">
      
      <div class="profile-header">
        <h2 class="main-title">P R O F I L E &nbsp; V I E W</h2>
      </div>

      <form [formGroup]="form" class="profile-form">
        
        <div class="avatar-section">
          <div class="avatar-circle">
            @if (currentProfilePicture) {
              <img [src]="currentProfilePicture" alt="Avatar">
            } @else {
              <i class="pi pi-image" style="font-size: 2rem; color: #999;"></i>
            }
          </div>
          <div class="file-upload-wrapper">
            <input type="file" id="profilePicture" accept="image/jpeg, image/png, image/webp" (change)="onFileSelect($event)" />
            <label for="profilePicture" class="add-file-btn">Add file</label>
          </div>
          
          <button pButton type="submit" (click)="onSubmit()" [disabled]="form.invalid" [loading]="isLoading" class="save-btn">Save</button>
        </div>

        <div class="form-fields-list">
          <div class="form-row">
            <label>Name</label>
            <input type="text" formControlName="username" placeholder="Placeholder" class="rounded-input" />
          </div>

          <div class="form-row">
            <label>Email address</label>
            <input type="email" value="Valami@gmail.com" disabled class="rounded-input readonly-input" />
          </div>

          <div class="form-row">
            <label>Major</label>
            <input type="text" formControlName="major" placeholder="Placeholder" class="rounded-input" />
          </div>

          <div class="form-row interests-row">
            <label>Interest area</label>
            <div class="interests-container">
              <p-multiSelect 
                id="interests" 
                [options]="interestOptions" 
                formControlName="interests" 
                optionLabel="label" 
                optionValue="value" 
                display="chip"
                [maxSelectedLabels]="10"
                styleClass="custom-prime-multiselect">
                
                <ng-template pTemplate="dropdownicon">
                  <div class="add-interest-icon">+</div>
                </ng-template>

              </p-multiSelect>
            </div>
          </div>
        </div> 
      </form>
    </div> 
  </div>
</div>
