<div class="drawer card flex justify-center">
	<p-drawer [(visible)]="visible">
		<ng-template #header>
			<h2 routerLink="/">Campus life</h2>

			<button pButton class="close-btn" type="button" aria-label="Close" [rounded]="true" [text]="true" severity="danger">
				<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
					<path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
				</svg>
			</button>
		</ng-template>
		<ul>
			<li><a routerLink="/landing" routerLinkActive="active" (click)="visible = false">Home</a></li>
			<li><a routerLink="/events" routerLinkActive="active" (click)="visible = false">Events</a></li>
			<li><a routerLink="/profile" routerLinkActive="active" (click)="visible = false">Profile</a></li>
		</ul>
		<ng-template #footer>
			<div class="logout">
				<p-button class="icon-btn small" (onClick)="authService.logout()" variant="outlined" severity="danger" fluid>
					<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
						<path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15m3 0 3-3m0 0-3-3m3 3H9" />
					</svg>
					<span>Log out</span>
				</p-button>
			</div>
		</ng-template>
	</p-drawer>
	
	<button pButton class="icon-btn" type="button" aria-label="Open Sidebar" severity="secondary" (click)="visible = true">
		<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
			<path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25H12" />
		</svg>
	</button>
</div>
