services:
  backend:
    image: campuslife-backend:test
    env_file:
      - .env.test
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DATABASE: campuslife_test
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/campuslife_test?schema=public
    volumes:
      - ./apps/backend:/app
      - backend_test_node_modules:/app/node_modules
    ports:
      - ${BACKEND_PORT_TEST:-3001}:3000
    restart: on-failure

  frontend:
    image: campuslife-frontend:test
    env_file:
      - .env.test
    volumes:
      - ./apps/frontend:/app
      - frontend_test_node_modules:/app/node_modules
    ports:
      - ${FRONTEND_PORT_TEST:-4201}:4200
    restart: on-failure

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: campuslife_test
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    ports:
      - ${POSTGRES_PORT_TEST:-5433}:5432
    restart: on-failure

volumes:
  backend_test_node_modules:
  frontend_test_node_modules:
  postgres_test_data:
