services:
  nginx:
    image: nginx:alpine
    ports:
      - ${WEBSERVER_PORT}:80
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: always

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    env_file:
      - .env
    volumes:
      - ./apps/backend:/app
      - backend_node_modules:/app/node_modules
    ports:
      - ${BACKEND_PORT}:3000

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    volumes:
      - ./apps/frontend:/app
      - /app/node_modules
    ports:
      - ${FRONTEND_PORT}:4200

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DATABASE}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: {}
  backend_node_modules: {}
#  frontend_node_modules: {}
